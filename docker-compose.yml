services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: customerdb
      POSTGRES_USER: banreservas
      POSTGRES_PASSWORD: banreservas123
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banreservas -d customerdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    ports:
      - "8080:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/customerdb
      QUARKUS_DATASOURCE_USERNAME: banreservas
      QUARKUS_DATASOURCE_PASSWORD: banreservas123
      QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION: update
      QUARKUS_REST_CLIENT_COUNTRY_API_URL: https://restcountries.com
    depends_on:
      postgres:
        condition: service_healthy

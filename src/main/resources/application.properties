# --- Database (Dev Services auto-provisions PostgreSQL via Docker) ---
quarkus.datasource.db-kind=postgresql
%dev.quarkus.hibernate-orm.database.generation=update
%test.quarkus.hibernate-orm.database.generation=drop-and-create

# --- JWT Verification ---
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://banreservas.com

# --- JWT Signing ---
smallrye.jwt.sign.key.location=privateKey.pem
smallrye.jwt.new-token.lifespan=3600
smallrye.jwt.new-token.issuer=https://banreservas.com

# --- REST Client: restcountries.com ---
quarkus.rest-client.country-api.url=https://restcountries.com

# --- Demo Auth Credentials (DEMO ONLY — replace with env vars or secrets manager in production) ---
app.auth.username=admin
app.auth.password=secret123

# --- Test profile overrides ---
%test.quarkus.rest-client.country-api.url=https://restcountries.com
%test.app.auth.username=admin
%test.app.auth.password=secret123
